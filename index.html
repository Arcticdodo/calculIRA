<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Analyse IRA">
<link rel="apple-touch-icon" href="icon-180.png" sizes="180x180">
<title>Analyse IRA - Fonctionnelle ou NTA</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        -webkit-tap-highlight-color: transparent;
    }
    body {
        font-family: Arial, sans-serif;
        max-width: 980px;
        margin: auto;
        background: #f4f4f4;
        padding: clamp(16px, 3vw, 36px);
        font-size: 1rem;
        box-sizing: border-box;
    }
    h1 {
        text-align: center;
        font-size: 1.6rem;
    }
    fieldset {
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: clamp(16px, 2.5vw, 28px);
        margin: 0;
        background-color: #fff;
        min-width: 0;
    }
    legend {
        font-weight: bold;
        padding: 0 10px;
    }
    label {
        display: flex;
        flex-direction: column;
        margin-top: 15px;
    }
    .fields-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 24px;
        margin-top: 24px;
        align-items: start;
    }
    .input-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 110px auto;
        align-items: center;
        gap: 8px;
        margin-bottom: 3px;
    }
    .input-row input[type="number"] {
        padding: 0.6em;
        width: 100%;
        min-width: 0;
        font-size: 1.1rem;
        text-align: right;
        box-sizing: border-box;
        border: 1px solid #999;
        border-radius: 5px;
    }
    .input-row input[type="number"]:focus {
        outline: 3px solid rgba(0, 123, 255, 0.25);
        border-color: #007bff;
    }
    .input-unit {
        font-size: 0.9em;
        color: #555;
        margin-left: 8px;
        white-space: nowrap;
    }
    button.analyse-btn {
        margin-top: 20px;
        padding: 0.8em;
        width: 100%;
        background-color: #4CAF50;
        color: white;
        border: none;
        font-size: 1.1rem;
        cursor: pointer;
        border-radius: 6px;
    }
    button.analyse-btn:hover {
        background-color: #45a049;
    }
    .result {
        margin-top: 20px;
        padding: 10px;
        background-color: white;
        border-radius: 5px;
        font-size: 1em;
    }
    .result-line {
        margin-bottom: 8px;
    }
    .ira-fonctionnelle {
        color: #007bff;
        font-weight: bold;
    }
    .nta {
        color: #d9534f;
        font-weight: bold;
    }
    .error {
        color: #d9534f;
        font-weight: bold;
        margin-top: 10px;
        text-align: center;
    }
    /* Boîte de chiffres tactile avec défilement */
    .digit-box {
        margin-top: 8px;
        display: none;
        gap: 8px;
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 5px;
    }
    .digit-box button {
        flex: 0 0 auto;
        min-width: 50px;
        height: 50px;
        font-size: 1.2rem;
        cursor: pointer;
        border-radius: 6px;
        border: 1px solid #ccc;
        background-color: #eee;
        transition: background-color 0.3s;
        user-select: none;
    }
    .digit-box button:hover {
        background-color: #ddd;
    }
    .digit-box button.clear-btn {
        min-width: 60px;
        background-color: #f44336;
        color: white;
        font-weight: bold;
    }
    .digit-box button.clear-btn:hover {
        background-color: #d32f2f;
    }
    .desktop-hint {
        color: #555;
        font-size: 0.95rem;
        margin-bottom: 0;
    }
    @media (max-width: 760px) {
        .fields-grid {
            grid-template-columns: 1fr;
            gap: 18px;
            margin-top: 18px;
        }
    }
    @media (max-width: 520px) {
        body { font-size: 1.05rem; }
        h1 { font-size: 1.4rem; }
        .input-row {
            grid-template-columns: minmax(100px, 1fr) auto;
        }
        .input-label {
            grid-column: 1 / -1;
            font-weight: 600;
        }
        .input-row input[type="number"] {
            font-size: 1.2rem;
            max-width: 150px;
            text-align: left;
        }
        button.analyse-btn {
            min-height: 52px;
        }
    }
    @media (hover: none), (pointer: coarse) {
        .digit-box {
            display: flex;
        }
        .desktop-hint {
            display: none;
        }
    }
</style>
</head>
<body>

<h1>Analyse IRA</h1>
<p>Entrez les valeurs avec le clavier de votre appareil.</p>
<p class="desktop-hint">Sur ordinateur, utilisez le clavier ou les flèches des champs numériques.</p>

<form id="iraForm" onsubmit="return false;">
  <div class="fields-grid">
    <fieldset>
        <legend>Variables plasmatiques</legend>
        <label>
            <div class="input-row">
                <span class="input-label">Urée plasmatique :</span>
                <input type="number" inputmode="decimal" step="any" id="ureeP" min="0" placeholder="ex: 6.5" autocomplete="off" />
                <span class="input-unit">mmol/L</span>
            </div>
            <div class="digit-box" data-target="ureeP"></div>
        </label>
        <label>
            <div class="input-row">
                <span class="input-label">Créatininémie plasmatique :</span>
                <input type="number" inputmode="decimal" step="any" id="creatP" min="0" placeholder="ex: 90" autocomplete="off" />
                <span class="input-unit">µmol/L</span>
            </div>
            <div class="digit-box" data-target="creatP"></div>
        </label>
        <label>
            <div class="input-row">
                <span class="input-label">Natrémie :</span>
                <input type="number" inputmode="decimal" step="any" id="naP" min="0" placeholder="ex: 140" autocomplete="off" />
                <span class="input-unit">mmol/L</span>
            </div>
            <div class="digit-box" data-target="naP"></div>
        </label>
    </fieldset>

    <fieldset>
        <legend>Variables urinaires</legend>
        <label>
            <div class="input-row">
                <span class="input-label">Urée urinaire :</span>
                <input type="number" inputmode="decimal" step="any" id="ureeU" min="0" placeholder="ex: 250" autocomplete="off" />
                <span class="input-unit">mmol/L</span>
            </div>
            <div class="digit-box" data-target="ureeU"></div>
        </label>
        <label>
            <div class="input-row">
                <span class="input-label">Créatinine urinaire :</span>
                <input type="number" inputmode="decimal" step="any" id="creatU" min="0" placeholder="ex: 1000" autocomplete="off" />
                <span class="input-unit">µmol/L</span>
            </div>
            <div class="digit-box" data-target="creatU"></div>
        </label>
        <label>
            <div class="input-row">
                <span class="input-label">Natriurie :</span>
                <input type="number" inputmode="decimal" step="any" id="naU" min="0" placeholder="ex: 60" autocomplete="off" />
                <span class="input-unit">mmol/L</span>
            </div>
            <div class="digit-box" data-target="naU"></div>
        </label>
        <label>
            <div class="input-row">
                <span class="input-label">Kaliurie :</span>
                <input type="number" inputmode="decimal" step="any" id="kU" min="0" placeholder="ex: 30" autocomplete="off" />
                <span class="input-unit">mmol/L</span>
            </div>
            <div class="digit-box" data-target="kU"></div>
        </label>
    </fieldset>
  </div>

    <button type="button" class="analyse-btn" onclick="analyser()">Analyser</button>
</form>

<div id="resultats" class="result" role="region" aria-live="polite"></div>

<script>
    document.querySelectorAll('.digit-box').forEach(box => {
        for(let i=1; i<=9; i++) {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.textContent = i;
            btn.setAttribute('aria-label', 'Chiffre ' + i);
            btn.addEventListener('click', () => {
                const input = document.getElementById(box.dataset.target);
                if(input) {
                    let curVal = input.value || '';
                    if(curVal === '0' || curVal === '') input.value = i;
                    else if(curVal.length < 7) input.value = curVal + i;
                    input.focus();
                }
            });
            box.appendChild(btn);
        }
        const zeroBtn = document.createElement('button');
        zeroBtn.type = 'button';
        zeroBtn.textContent = '0';
        zeroBtn.setAttribute('aria-label', 'Chiffre 0');
        zeroBtn.addEventListener('click', () => {
            const input = document.getElementById(box.dataset.target);
            if(input) {
                let curVal = input.value || '';
                if(curVal !== '' && curVal.length < 7) input.value = curVal + '0';
                input.focus();
            }
        });
        box.appendChild(zeroBtn);

        const decimalBtn = document.createElement('button');
        decimalBtn.type = 'button';
        decimalBtn.textContent = ',';
        decimalBtn.setAttribute('aria-label', 'Séparateur décimal');
        decimalBtn.addEventListener('click', () => {
            const input = document.getElementById(box.dataset.target);
            if(input && !input.value.includes('.')) {
                input.value = input.value === '' ? '0.' : input.value + '.';
                input.focus();
            }
        });
        box.appendChild(decimalBtn);

        const clearBtn = document.createElement('button');
        clearBtn.type = 'button';
        clearBtn.textContent = '←';
        clearBtn.setAttribute('aria-label', 'Effacer dernier chiffre');
        clearBtn.classList.add('clear-btn');
        clearBtn.addEventListener('click', () => {
            const input = document.getElementById(box.dataset.target);
            if(input) {
                input.value = input.value.slice(0, -1);
                input.focus();
            }
        });
        box.appendChild(clearBtn);
    });

    function analyser() {
        const fields = [
            {id: 'ureeP', name: "Urée plasmatique"},
            {id: 'creatP', name: "Créatininémie plasmatique"},
            {id: 'naP', name: "Natrémie"},
            {id: 'ureeU', name: "Urée urinaire"},
            {id: 'creatU', name: "Créatinine urinaire"},
            {id: 'naU', name: "Natriurie"},
            {id: 'kU', name: "Kaliurie"},
        ];
        let values = {}, missingFields = [];
        for(let f of fields) {
            let valRaw = document.getElementById(f.id).value.trim();
            let valNum = parseFloat(valRaw);
            if(valRaw === "" || isNaN(valNum) || valNum <= 0) {
                values[f.id] = null;
                if(valRaw === "") missingFields.push(f.name);
            } else values[f.id] = valNum;
        }
        clearError();
        const normes = {ratioUreeCreatP: "100", feNa: "1%", naK: "1", upUree: "10", upCreat: "30"};
        function getClassAndText(value, seuil, plusGrandMeilleur) {
            if(plusGrandMeilleur) return value > seuil ? {className: "ira-fonctionnelle", text: "IRA Fonctionnelle"} : {className: "nta", text: "NTA"};
            else return value < seuil ? {className: "ira-fonctionnelle", text: "IRA Fonctionnelle"} : {className: "nta", text: "NTA"};
        }
        let results = [];
        if(values.ureeP && values.creatP) {
            let ratio = (values.ureeP * 1000) / values.creatP;
            let res = getClassAndText(ratio, parseFloat(normes.ratioUreeCreatP), true);
            results.push(`Urée/Créat plasmatique = ${ratio.toFixed(1)} (norme ${normes.ratioUreeCreatP}) → <span class="${res.className}">${res.text}</span>`);
        }
        if(values.naU && values.creatP && values.naP && values.creatU) {
            let feNa = ((values.naU * values.creatP) / (values.naP * values.creatU)) * 100;
            let res = getClassAndText(feNa, parseFloat(normes.feNa), false);
            results.push(`FE Na+ = ${feNa.toFixed(2)}% (norme ${normes.feNa}) → <span class="${res.className}">${res.text}</span>`);
        }
        if(values.naU && values.kU) {
            let naKRatio = values.naU / values.kU;
            let res = getClassAndText(naKRatio, parseFloat(normes.naK), false);
            results.push(`Na+/K+ urinaire = ${naKRatio.toFixed(2)} (norme ${normes.naK}) → <span class="${res.className}">${res.text}</span>`);
        }
        if(values.ureeU && values.ureeP) {
            let upUree = values.ureeU / values.ureeP;
            let res = getClassAndText(upUree, parseFloat(normes.upUree), true);
            results.push(`U/P urée = ${upUree.toFixed(2)} (norme ${normes.upUree}) → <span class="${res.className}">${res.text}</span>`);
        }
        if(values.creatU && values.creatP) {
            let upCreat = values.creatU / values.creatP;
            let res = getClassAndText(upCreat, parseFloat(normes.upCreat), true);
            results.push(`U/P créatinine = ${upCreat.toFixed(2)} (norme ${normes.upCreat}) → <span class="${res.className}">${res.text}</span>`);
        }
        let countFonctionnelle = 0, countNTA = 0;
        results.forEach(line => {
            if(line.includes('ira-fonctionnelle')) countFonctionnelle++;
            if(line.includes('nta')) countNTA++;
        });
        if(results.length === 0) {
            showError("Pas assez de valeurs valides pour effectuer l'analyse.");
            return;
        }
        let synthese = "";
        if(countFonctionnelle > countNTA)
            synthese = `<p><strong>Synthèse :</strong> La majorité des indices indiquent une <span class="ira-fonctionnelle">IRA Fonctionnelle</span>.</p>`;
        else if(countNTA > countFonctionnelle)
            synthese = `<p><strong>Synthèse :</strong> La majorité des indices indiquent une <span class="nta">NTA</span>.</p>`;
        else
            synthese = `<p><strong>Synthèse :</strong> Les indices sont partagés ou insuffisants pour trancher clairement.</p>`;
        document.getElementById('resultats').innerHTML = results.map(r => `<div class="result-line">${r}</div>`).join('') + synthese;
    }
    function showError(msg) { document.getElementById('resultats').innerHTML = `<div class="error">${msg}</div>`; }
    function clearError() { document.getElementById('resultats').innerHTML = ''; }
</script>

</body>
</html>
