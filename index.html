<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Analyse IRA">
<link rel="apple-touch-icon" href="icon-180.png" sizes="180x180">
<title>Analyse IRA - Fonctionnelle ou NTA</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        -webkit-tap-highlight-color: transparent;
    }
    body {
        font-family: Arial, sans-serif;
        max-width: 980px;
        margin: auto;
        background: #f4f4f4;
        padding: clamp(16px, 3vw, 36px);
        font-size: 1rem;
        box-sizing: border-box;
    }
    h1 {
        text-align: center;
        font-size: 1.6rem;
    }
    .app-header {
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }
    .touch-toggle {
        position: absolute;
        right: 0;
        min-height: 42px;
        padding: 0 16px;
        border: 1px solid #777;
        border-radius: 999px;
        background: #fff;
        color: #222;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
    }
    .touch-toggle[aria-pressed="true"] {
        border-color: #007bff;
        background: #007bff;
        color: #fff;
    }
    fieldset {
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: clamp(16px, 2.5vw, 28px);
        margin: 0;
        background-color: #fff;
        min-width: 0;
    }
    legend {
        font-weight: bold;
        padding: 0 10px;
    }
    label {
        display: flex;
        flex-direction: column;
        margin-top: 15px;
    }
    .fields-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 24px;
        margin-top: 24px;
        align-items: start;
    }
    .input-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 110px auto;
        align-items: center;
        gap: 8px;
        margin-bottom: 3px;
    }
    .input-row input[type="number"] {
        padding: 0.6em;
        width: 100%;
        min-width: 0;
        font-size: 1.1rem;
        text-align: right;
        box-sizing: border-box;
        border: 1px solid #999;
        border-radius: 5px;
    }
    .input-row input[type="number"]:focus {
        outline: 3px solid rgba(0, 123, 255, 0.25);
        border-color: #007bff;
    }
    .input-unit {
        font-size: 0.9em;
        color: #555;
        margin-left: 8px;
        white-space: nowrap;
    }
    button.analyse-btn {
        margin-top: 20px;
        padding: 0.8em;
        width: 100%;
        background-color: #4CAF50;
        color: white;
        border: none;
        font-size: 1.1rem;
        cursor: pointer;
        border-radius: 6px;
    }
    button.analyse-btn:hover {
        background-color: #45a049;
    }
    .context-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-top: 16px;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        background: #fff;
    }
    .context-row label {
        display: inline;
        margin: 0;
        font-weight: bold;
    }
    .context-row select {
        min-height: 42px;
        padding: 6px 34px 6px 10px;
        border: 1px solid #888;
        border-radius: 6px;
        background: #fff;
        font-size: 1rem;
    }
    .result {
        margin-top: 20px;
        padding: 18px;
        background-color: white;
        border-radius: 8px;
        font-size: 1.2rem;
        line-height: 1.45;
        scroll-margin-top: 12px;
    }
    .result-line {
        margin-bottom: 12px;
        padding-bottom: 12px;
        border-bottom: 1px solid #e5e5e5;
    }
    .result-line:last-of-type {
        border-bottom: 0;
    }
    .result-advice {
        margin-bottom: 16px;
        padding: 14px;
        border-left: 5px solid #b7791f;
        border-radius: 6px;
        background: #fff7db;
        font-weight: bold;
    }
    .limited {
        color: #8a5a00;
        font-weight: bold;
    }
    .result .synthese {
        margin-top: 18px;
        padding: 14px;
        border-radius: 6px;
        background: #f0f4f8;
        font-size: 1.25rem;
    }
    .medical-note {
        margin: 14px 0 0;
        color: #555;
        font-size: 0.9em;
        font-weight: normal;
    }
    .ira-fonctionnelle {
        color: #007bff;
        font-weight: bold;
    }
    .nta {
        color: #d9534f;
        font-weight: bold;
    }
    .error {
        color: #d9534f;
        font-weight: bold;
        margin-top: 10px;
        text-align: center;
    }
    /* Boîte de chiffres tactile avec défilement */
    .digit-box {
        margin-top: 8px;
        display: none;
        gap: 8px;
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 5px;
    }
    .touch-mode .digit-box {
        display: flex;
    }
    .digit-box button {
        flex: 0 0 auto;
        min-width: 50px;
        height: 50px;
        font-size: 1.2rem;
        cursor: pointer;
        border-radius: 6px;
        border: 1px solid #ccc;
        background-color: #eee;
        transition: background-color 0.3s;
        user-select: none;
    }
    .digit-box button:hover {
        background-color: #ddd;
    }
    .digit-box button.clear-btn {
        min-width: 60px;
        background-color: #f44336;
        color: white;
        font-weight: bold;
    }
    .digit-box button.clear-btn:hover {
        background-color: #d32f2f;
    }
    .desktop-hint {
        color: #555;
        font-size: 0.95rem;
        margin-bottom: 0;
    }
    @media (max-width: 760px) {
        .fields-grid {
            grid-template-columns: 1fr;
            gap: 18px;
            margin-top: 18px;
        }
    }
    @media (max-width: 520px) {
        body {
            padding: 8px;
            font-size: 0.9rem;
        }
        .app-header {
            min-height: 42px;
        }
        h1 {
            margin: 0;
            font-size: 1.25rem;
        }
        .touch-toggle {
            min-height: 38px;
            padding: 0 13px;
            font-size: 0.9rem;
        }
        body > p {
            display: none;
        }
        .fields-grid {
            gap: 7px;
            margin-top: 7px;
        }
        fieldset {
            padding: 6px 8px 8px;
        }
        legend {
            padding: 0 6px;
            font-size: 0.9rem;
        }
        label {
            margin-top: 5px;
        }
        .input-row {
            grid-template-columns: minmax(0, 1fr) 88px auto;
            gap: 4px;
            margin: 0;
        }
        .input-label {
            font-weight: 600;
            font-size: 0.82rem;
            line-height: 1.05;
        }
        .input-row input[type="number"] {
            padding: 5px 6px;
            min-height: 36px;
            font-size: 1rem;
            text-align: right;
        }
        .input-unit {
            margin-left: 0;
            font-size: 0.72rem;
        }
        button.analyse-btn {
            min-height: 44px;
            margin-top: 8px;
            padding: 0.55em;
        }
        .context-row {
            justify-content: space-between;
            gap: 6px;
            margin-top: 7px;
            padding: 5px 8px;
        }
        .context-row label {
            font-size: 0.8rem;
        }
        .context-row select {
            min-height: 36px;
            max-width: 135px;
            padding: 4px 24px 4px 7px;
            font-size: 0.85rem;
        }
        .result {
            margin-top: 10px;
            padding: 14px;
            font-size: 1.08rem;
        }
        .result:not(:empty) {
            min-height: calc(100svh - 20px);
            box-sizing: border-box;
        }
        .digit-box {
            margin-top: 5px;
        }
        .digit-box button {
            min-width: 44px;
            height: 44px;
            font-size: 1.05rem;
        }
    }
</style>
</head>
<body>

<header class="app-header">
    <h1>Analyse IRA</h1>
    <button type="button" id="touchToggle" class="touch-toggle" aria-pressed="false" onclick="toggleTouchMode()">Touch</button>
</header>
<p>Entrez les valeurs avec le clavier de votre appareil.</p>
<p class="desktop-hint">Sur ordinateur, utilisez le clavier ou les flèches des champs numériques.</p>

<form id="iraForm" onsubmit="return false;">
  <div class="fields-grid">
    <fieldset>
        <legend>Variables plasmatiques</legend>
        <label>
            <div class="input-row">
                <span class="input-label">Urée plasmatique :</span>
                <input type="number" inputmode="decimal" step="any" id="ureeP" min="0" placeholder="ex: 6.5" autocomplete="off" />
                <span class="input-unit">mmol/L</span>
            </div>
            <div class="digit-box" data-target="ureeP"></div>
        </label>
        <label>
            <div class="input-row">
                <span class="input-label">Créatininémie plasmatique :</span>
                <input type="number" inputmode="decimal" step="any" id="creatP" min="0" placeholder="ex: 90" autocomplete="off" />
                <span class="input-unit">µmol/L</span>
            </div>
            <div class="digit-box" data-target="creatP"></div>
        </label>
        <label>
            <div class="input-row">
                <span class="input-label">Natrémie :</span>
                <input type="number" inputmode="decimal" step="any" id="naP" min="0" placeholder="ex: 140" autocomplete="off" />
                <span class="input-unit">mmol/L</span>
            </div>
            <div class="digit-box" data-target="naP"></div>
        </label>
    </fieldset>

    <fieldset>
        <legend>Variables urinaires</legend>
        <label>
            <div class="input-row">
                <span class="input-label">Urée urinaire :</span>
                <input type="number" inputmode="decimal" step="any" id="ureeU" min="0" placeholder="ex: 250" autocomplete="off" />
                <span class="input-unit">mmol/L</span>
            </div>
            <div class="digit-box" data-target="ureeU"></div>
        </label>
        <label>
            <div class="input-row">
                <span class="input-label">Créatinine urinaire :</span>
                <input type="number" inputmode="decimal" step="any" id="creatU" min="0" placeholder="ex: 1000" autocomplete="off" />
                <span class="input-unit">µmol/L</span>
            </div>
            <div class="digit-box" data-target="creatU"></div>
        </label>
        <label>
            <div class="input-row">
                <span class="input-label">Natriurie :</span>
                <input type="number" inputmode="decimal" step="any" id="naU" min="0" placeholder="ex: 60" autocomplete="off" />
                <span class="input-unit">mmol/L</span>
            </div>
            <div class="digit-box" data-target="naU"></div>
        </label>
        <label>
            <div class="input-row">
                <span class="input-label">Kaliurie :</span>
                <input type="number" inputmode="decimal" step="any" id="kU" min="0" placeholder="ex: 30" autocomplete="off" />
                <span class="input-unit">mmol/L</span>
            </div>
            <div class="digit-box" data-target="kU"></div>
        </label>
    </fieldset>
  </div>

    <div class="context-row">
        <label for="diuretic">Diurétique avant le prélèvement&nbsp;?</label>
        <select id="diuretic">
            <option value="unknown">Inconnu</option>
            <option value="no">Non</option>
            <option value="yes">Oui</option>
        </select>
    </div>

    <button type="button" class="analyse-btn" onclick="analyser()">Analyser</button>
</form>

<div id="resultats" class="result" role="region" aria-live="polite"></div>

<script>
    function toggleTouchMode() {
        const isActive = document.body.classList.toggle('touch-mode');
        document.getElementById('touchToggle').setAttribute('aria-pressed', String(isActive));
    }

    document.querySelectorAll('.digit-box').forEach(box => {
        for(let i=1; i<=9; i++) {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.textContent = i;
            btn.setAttribute('aria-label', 'Chiffre ' + i);
            btn.addEventListener('click', () => {
                const input = document.getElementById(box.dataset.target);
                if(input) {
                    let curVal = input.value || '';
                    if(curVal === '0' || curVal === '') input.value = i;
                    else if(curVal.length < 7) input.value = curVal + i;
                    input.focus();
                }
            });
            box.appendChild(btn);
        }
        const zeroBtn = document.createElement('button');
        zeroBtn.type = 'button';
        zeroBtn.textContent = '0';
        zeroBtn.setAttribute('aria-label', 'Chiffre 0');
        zeroBtn.addEventListener('click', () => {
            const input = document.getElementById(box.dataset.target);
            if(input) {
                let curVal = input.value || '';
                if(curVal !== '' && curVal.length < 7) input.value = curVal + '0';
                input.focus();
            }
        });
        box.appendChild(zeroBtn);

        const decimalBtn = document.createElement('button');
        decimalBtn.type = 'button';
        decimalBtn.textContent = ',';
        decimalBtn.setAttribute('aria-label', 'Séparateur décimal');
        decimalBtn.addEventListener('click', () => {
            const input = document.getElementById(box.dataset.target);
            if(input && !input.value.includes('.')) {
                input.value = input.value === '' ? '0.' : input.value + '.';
                input.focus();
            }
        });
        box.appendChild(decimalBtn);

        const clearBtn = document.createElement('button');
        clearBtn.type = 'button';
        clearBtn.textContent = '←';
        clearBtn.setAttribute('aria-label', 'Effacer dernier chiffre');
        clearBtn.classList.add('clear-btn');
        clearBtn.addEventListener('click', () => {
            const input = document.getElementById(box.dataset.target);
            if(input) {
                input.value = input.value.slice(0, -1);
                input.focus();
            }
        });
        box.appendChild(clearBtn);
    });

    function analyser() {
        if(document.activeElement instanceof HTMLElement) document.activeElement.blur();
        const fields = [
            {id: 'ureeP', name: "Urée plasmatique"},
            {id: 'creatP', name: "Créatininémie plasmatique"},
            {id: 'naP', name: "Natrémie"},
            {id: 'ureeU', name: "Urée urinaire"},
            {id: 'creatU', name: "Créatinine urinaire"},
            {id: 'naU', name: "Natriurie"},
            {id: 'kU', name: "Kaliurie"},
        ];
        let values = {}, missingFields = [];
        for(let f of fields) {
            let valRaw = document.getElementById(f.id).value.trim();
            let valNum = parseFloat(valRaw);
            if(valRaw === "" || isNaN(valNum) || valNum <= 0) {
                values[f.id] = null;
                if(valRaw === "") missingFields.push(f.name);
            } else values[f.id] = valNum;
        }
        clearError();
        const diureticStatus = document.getElementById('diuretic').value;
        const normes = {ratioUreeCreatP: "100", feNa: "1%", feUree: "35%", naK: "1", upUree: "10", upCreat: "30"};
        function getClassAndText(value, seuil, plusGrandMeilleur) {
            if(plusGrandMeilleur) return value > seuil ? {className: "ira-fonctionnelle", text: "IRA Fonctionnelle"} : {className: "nta", text: "NTA"};
            else return value < seuil ? {className: "ira-fonctionnelle", text: "IRA Fonctionnelle"} : {className: "nta", text: "NTA"};
        }
        let results = [];
        let advice = "";
        if(diureticStatus === 'yes') {
            advice = `<div class="result-advice">Sous diurétique : considérer surtout la <strong>FE urée</strong>, avec prudence. La FE Na, la natriurie et le rapport Na+/K+ urinaire sont moins fiables.</div>`;
        } else if(diureticStatus === 'unknown') {
            advice = `<div class="result-advice">Prise de diurétique inconnue : la FE Na, la natriurie et le rapport Na+/K+ doivent être interprétés avec prudence.</div>`;
        }
        if(values.ureeP && values.creatP) {
            let ratio = (values.ureeP * 1000) / values.creatP;
            let res = getClassAndText(ratio, parseFloat(normes.ratioUreeCreatP), true);
            results.push(`Urée/Créat plasmatique = ${ratio.toFixed(1)} (norme ${normes.ratioUreeCreatP}) → <span class="${res.className}">${res.text}</span>`);
        }
        if(values.naU && values.creatP && values.naP && values.creatU) {
            let feNa = ((values.naU * values.creatP) / (values.naP * values.creatU)) * 100;
            if(diureticStatus === 'no') {
                let res = getClassAndText(feNa, parseFloat(normes.feNa), false);
                results.push(`FE Na+ = ${feNa.toFixed(2)}% (seuil ${normes.feNa}) → <span class="${res.className}">${res.text}</span>`);
            } else {
                results.push(`FE Na+ = ${feNa.toFixed(2)}% → <span class="limited">interprétation limitée si diurétique</span>`);
            }
        }
        if(values.ureeU && values.creatP && values.ureeP && values.creatU) {
            let feUree = ((values.ureeU * values.creatP) / (values.ureeP * values.creatU)) * 100;
            let res = getClassAndText(feUree, parseFloat(normes.feUree), false);
            let priority = diureticStatus === 'yes' ? `<strong>Indice à considérer en priorité sous diurétique :</strong> ` : '';
            results.push(`${priority}FE urée = ${feUree.toFixed(2)}% (seuil indicatif ${normes.feUree}) → <span class="${res.className}">${res.text}</span>`);
        }
        if(values.naU && values.kU) {
            let naKRatio = values.naU / values.kU;
            if(diureticStatus === 'no') {
                let res = getClassAndText(naKRatio, parseFloat(normes.naK), false);
                results.push(`Na+/K+ urinaire = ${naKRatio.toFixed(2)} (seuil ${normes.naK}) → <span class="${res.className}">${res.text}</span>`);
            } else {
                results.push(`Na+/K+ urinaire = ${naKRatio.toFixed(2)} → <span class="limited">interprétation limitée si diurétique</span>`);
            }
        }
        if(values.ureeU && values.ureeP) {
            let upUree = values.ureeU / values.ureeP;
            let res = getClassAndText(upUree, parseFloat(normes.upUree), true);
            results.push(`U/P urée = ${upUree.toFixed(2)} (norme ${normes.upUree}) → <span class="${res.className}">${res.text}</span>`);
        }
        if(values.creatU && values.creatP) {
            let upCreat = values.creatU / values.creatP;
            let res = getClassAndText(upCreat, parseFloat(normes.upCreat), true);
            results.push(`U/P créatinine = ${upCreat.toFixed(2)} (norme ${normes.upCreat}) → <span class="${res.className}">${res.text}</span>`);
        }
        let countFonctionnelle = 0, countNTA = 0;
        results.forEach(line => {
            if(line.includes('ira-fonctionnelle')) countFonctionnelle++;
            if(line.includes('nta')) countNTA++;
        });
        if(results.length === 0) {
            showError("Pas assez de valeurs valides pour effectuer l'analyse.");
            return;
        }
        let synthese = "";
        if(countFonctionnelle > countNTA)
            synthese = `<p class="synthese"><strong>Synthèse :</strong> La majorité des indices indiquent une <span class="ira-fonctionnelle">IRA Fonctionnelle</span>.</p>`;
        else if(countNTA > countFonctionnelle)
            synthese = `<p class="synthese"><strong>Synthèse :</strong> La majorité des indices indiquent une <span class="nta">NTA</span>.</p>`;
        else
            synthese = `<p class="synthese"><strong>Synthèse :</strong> Les indices sont partagés ou insuffisants pour trancher clairement.</p>`;
        const medicalNote = `<p class="medical-note">Interprétation indicative : même sous diurétique, la FE urée ne permet pas à elle seule de déterminer la cause de l’IRA. À confronter au contexte clinique et au sédiment urinaire.</p>`;
        document.getElementById('resultats').innerHTML = advice + results.map(r => `<div class="result-line">${r}</div>`).join('') + synthese + medicalNote;
        scrollToResults();
    }
    function scrollToResults() {
        requestAnimationFrame(() => {
            document.getElementById('resultats').scrollIntoView({behavior: 'smooth', block: 'start'});
        });
    }
    function showError(msg) {
        document.getElementById('resultats').innerHTML = `<div class="error">${msg}</div>`;
        scrollToResults();
    }
    function clearError() { document.getElementById('resultats').innerHTML = ''; }
</script>

</body>
</html>
